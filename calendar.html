<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sports Calendar HD - Persistencia</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700&family=Barlow:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Estilos se mantienen idénticos para preservar el diseño elegante y deportivo */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gold: #c8a84b;
            --green: #00ff88;
            --bg: #121212;
            --panel: #1a1a1a;
            --border: #333;
            --text: #eee;
            --muted: #888;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            grid-template-columns: 380px 1fr;
            min-height: 100vh;
        }

        .sb {
            background: var(--panel);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        .sb-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 5px;
        }

        .lbl {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 5px;
            display: block;
        }

        input,
        textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'Barlow', sans-serif;
            font-size: 13px;
            padding: 10px;
            border-radius: 6px;
            outline: none;
        }

        .day-block {
            background: #222;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .day-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: #2a2a2a;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        .day-hdr-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .day-body {
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 10px;
            background: #1a1a1a;
        }

        .ev-row {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #000;
            padding: 6px;
            border-radius: 6px;
        }

        .ev-row input {
            font-size: 12px;
            padding: 6px;
            border: none;
            background: transparent;
            color: white;
        }

        .btn-add {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px dashed #555;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 5px;
        }

        .btn-gen {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            border: none;
            color: #000;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
        }

        .btn-hd {
            width: 100%;
            padding: 16px;
            background: #00c853;
            border: none;
            color: #fff;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 12px;
        }

        .pv {
            overflow: auto;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .cal {
            width: 960px;
            min-height: 540px;
            position: relative;
            overflow: hidden;
            background-color: #111;
        }

        .cal-bg-layer {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            z-index: 1;
            filter: blur(6px);
            transform: scale(1.1);
            background-image: linear-gradient(to bottom, rgba(10, 10, 10, 0.7), rgba(20, 20, 20, 0.9)),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM5QzlCOTkiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4='),
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.2) 0%, rgba(0, 0, 0, 0) 50%),
                radial-gradient(circle at 80% 70%, rgba(200, 168, 75, 0.15) 0%, rgba(0, 0, 0, 0) 50%);
            background-size: auto, auto, 100% 100%, 100% 100%;
        }

        #cal-custom-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 2;
            display: none;
            opacity: 0.5;
            filter: blur(4px);
        }

        .cal-pitch-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAwIiBoZWlnaHQ9IjEwMDAiIHZpZXdCb3g9IjAgMCAxMDAwIDEwMDAiPjxnIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgwLDI1NSwxMzYsMC4wOCkiIHN0cm9rZS13aWR0aD0iMSI+PGxpbmUgeDE9IjUwMCIgeTE9IjAiIHgyPSI1MDAiIHkyPSIxMDAwIi8+PGNpcmNsZSBjeD0iNTAwIiBjeT0iNTA0IiByPSIxNTAiLz48cmVjdCB4PSIwIiB5PSIwIiB3aWR0aD0iMTAwMCIgaGVpZ2h0PSIxMDAwIi8+PC9nPjwvc3ZnPg==');
            background-size: cover;
            z-index: 3;
            opacity: 0.3;
        }

        .cal-content-wrapper {
            position: relative;
            z-index: 5;
        }

        .cal-hdr {
            padding: 45px 30px 20px;
            text-align: center;
        }

        .cal-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 90px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.9);
            line-height: 0.85;
        }

        .cal-logo {
            max-height: 110px;
            max-width: 320px;
            margin: 25px auto 10px;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.8));
        }

        .cal-casino {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: 15px;
            text-transform: uppercase;
        }

        .cal-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 15px 40px 30px;
            gap: 25px;
        }

        .cal-day {
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }

        .cal-day-lbl {
            display: inline-block;
            border: 2px solid var(--gold);
            padding: 5px 20px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.4);
        }

        .cal-cat {
            color: var(--green);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
        }

        .cal-ev {
            color: #fff;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .cal-footer {
            background: rgba(0, 0, 0, 0.85);
            border-top: 2px solid #222;
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="sb">
        <div class="sb-title">Sports Calendar HD</div>

        <div>
            <div class="lbl">1. Fecha (Lunes)</div>
            <input type="date" id="wk-date" onchange="updateDatesInSidebar()">
        </div>

        <div style="height:1px; background:var(--border); margin:5px 0;"></div>

        <div>
            <div class="lbl">2. Logo y Marca</div>
            <input type="file" id="logo-input" accept="image/*" style="margin-bottom:8px">
            <input type="text" id="casino" placeholder="Nombre Sportsbar">
            <textarea id="footer" placeholder="Texto pie de página..." rows="3" style="margin-top:8px"></textarea>
        </div>

        <div>
            <div class="lbl">3. Fondo Personalizado</div>
            <input type="file" id="bg-input" accept="image/*">
        </div>

        <div style="height:1px; background:var(--border); margin:5px 0;"></div>

        <div class="lbl">4. Eventos</div>
        <div id="days-container"></div>

        <button class="btn-gen" onclick="generate()">▶ GENERAR VISTA PREVIA</button>
        <button class="btn-hd" onclick="downloadHD()">📷 GUARDAR EN HD (PNG)</button>
    </div>

    <div class="pv">
        <div id="out">
            <div style="color:#444;text-align:center;padding:120px 0; font-weight:600;">Configura tus eventos y presiona
                Generar</div>
        </div>
    </div>

    <script>
        const DAYS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
        let logoData = null;
        let customBgData = null;

        // Inicializar bloques por primera vez
        (function init() {
            const today = new Date();
            const day = today.getDay();
            const diff = today.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(today.setDate(diff));
            document.getElementById('wk-date').value = monday.toISOString().split('T')[0];

            // Crear estructura inicial de los 7 días
            const container = document.getElementById('days-container');
            DAYS.forEach((name, i) => {
                const block = document.createElement('div');
                block.className = 'day-block';
                block.id = `block-${i}`;
                block.innerHTML = `
          <div class="day-hdr" onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display==='flex')?'none':'flex'">
            <span class="day-hdr-name">${name}</span>
            <span class="day-hdr-date" style="font-size:11px;color:#888;"></span>
          </div>
          <div class="day-body" data-day-idx="${i}" style="display:none">
            <div class="ev-list"></div>
            <button class="btn-add" onclick="addRow(${i})">+ AGREGAR PARTIDO</button>
          </div>`;
                container.appendChild(block);
            });
            updateDatesInSidebar();
        })();

        // Actualizar solo las etiquetas de fecha sin borrar los inputs
        function updateDatesInSidebar() {
            const baseInput = document.getElementById('wk-date').value;
            if (!baseInput) return;
            const base = new Date(baseInput + 'T00:00:00');

            DAYS.forEach((name, i) => {
                const current = new Date(base);
                current.setDate(base.getDate() + i);
                const dateStr = current.getDate() + '-' + current.toLocaleString('es', { month: 'short' });
                const dateSpan = document.querySelector(`#block-${i} .day-hdr-date`);
                if (dateSpan) dateSpan.innerText = dateStr;
            });
        }

        function addRow(idx) {
            const list = document.querySelector(`[data-day-idx="${idx}"] .ev-list`);
            const row = document.createElement('div');
            row.className = 'ev-row';
            row.innerHTML = `
        <input class="in-cat" placeholder="LIGA" style="width:75px; color:var(--green); font-weight:700;">
        <input class="in-txt" placeholder="Partido" style="flex:1;">
        <input class="in-time" placeholder="00:00" style="width:60px; color:var(--gold); font-weight:700;">
        <button style="background:none; border:none; color:#555; cursor:pointer;" onclick="this.parentElement.remove()">✕</button>`;
            list.appendChild(row);
        }

        // Resto de la lógica (Logo, Fondo, Generación, Descarga)
        document.getElementById('logo-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { logoData = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('bg-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { customBgData = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        };

        function generate() {
            const casino = document.getElementById('casino').value || 'SPORTSBAR';
            const footer = document.getElementById('footer').value;
            const baseDate = new Date(document.getElementById('wk-date').value + 'T00:00:00');

            let html = `<div class="cal" id="capture-node">
        <div class="cal-bg-layer"></div>
        <div id="cal-custom-bg" style="${customBgData ? `display:block; background-image:url(${customBgData});` : ''}"></div>
        <div class="cal-pitch-lines"></div>
        <div class="cal-content-wrapper">
            <div class="cal-hdr">
                <div class="cal-title">CALENDARIO SEMANAL</div>
                ${logoData ? `<img src="${logoData}" class="cal-logo">` : `<div class="cal-casino">${casino}</div>`}
            </div>
            <div class="cal-body">`;

            DAYS.forEach((name, i) => {
                const rows = document.querySelectorAll(`[data-day-idx="${i}"] .ev-row`);
                if (rows.length > 0) {
                    const current = new Date(baseDate);
                    current.setDate(baseDate.getDate() + i);
                    html += `<div class="cal-day"><div class="cal-day-lbl">${name} ${current.getDate()}</div>`;
                    rows.forEach(r => {
                        const cat = r.querySelector('.in-cat').value.toUpperCase();
                        const txt = r.querySelector('.in-txt').value;
                        const time = r.querySelector('.in-time').value;
                        html += `<div class="cal-ev">${cat ? `<span class="cal-cat">${cat}:</span> ` : ''}${txt}${time ? ` — ${time}` : ''}</div>`;
                    });
                    html += `</div>`;
                }
            });

            html += `</div><div class="cal-footer">${footer}</div></div></div>`;
            document.getElementById('out').innerHTML = html;
        }

        async function downloadHD() {
            const node = document.getElementById('capture-node');
            if (!node) return alert("Genera la vista previa primero");
            html2canvas(node, { scale: 3, backgroundColor: '#111', useCORS: true }).then(canvas => {
                const a = document.createElement('a');
                a.download = `sports-calendar.png`;
                a.href = canvas.toDataURL();
                a.click();
            });
        }
    </script>
</body>

</html>
